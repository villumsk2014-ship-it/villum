<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Drift Shooter with Tank Missiles</title>
<style>
body { margin:0; overflow:hidden; background:#0a0f1f; font-family: Arial; }
canvas { display:block; }
#ui { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; pointer-events:none; }
#gameOver, #startMenu {
  display:flex; flex-direction:column; align-items:center; gap:12px;
  background: rgba(0,0,0,0.7); padding:25px 35px; border-radius:12px;
  pointer-events:auto;
}
#gameOver { display:none; }
button { padding:10px 18px; font-size:16px; cursor:pointer; }
#shop { position:absolute; top:10px; right:10px; background:rgba(0,0,0,0.6); padding:10px; border-radius:10px; color:white; }
</style>
</head>
<body>
<canvas id="game"></canvas>

<div id="shop">
  <div>Coins: <span id="coins">0</span></div>
  <button onclick="buyRocket()">Rocket Bullets (100)</button>
  <div id="weapon">Weapon: Normal</div>
</div>

<div id="ui">
  <div id="startMenu">
    <h2 style="color:white;margin:0;">Select Difficulty</h2>
    <button onclick="startGame('easy')">Easy</button>
    <button onclick="startGame('medium')">Medium</button>
    <button onclick="startGame('hard')">Hard</button>
  </div>

  <div id="gameOver">
    <h2 style="color:white;margin:0;">Busted 🚓</h2>
    <button onclick="restart()">Restart</button>
  </div>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
ctx.font = "20px Arial";

let keys = {};
document.addEventListener("keydown", e => keys[e.key] = true);
document.addEventListener("keyup", e => keys[e.key] = false);
document.addEventListener("click", shoot);

const world = { width: 4000, height: 4000 };

let player, bullets, enemies, missiles, score, coins=0, alive, weapon;
let difficulty="medium", spawnRate=1200, enemySpeedMult=1;
let spawnInterval=null;

function startGame(diff){
  difficulty = diff;
  if(diff==="easy"){ spawnRate=2000; enemySpeedMult=0.7; }
  else if(diff==="medium"){ spawnRate=1200; enemySpeedMult=1; }
  else if(diff==="hard"){ spawnRate=600; enemySpeedMult=1.3; }

  document.getElementById("startMenu").style.display = "none";
  init();

  if(spawnInterval) clearInterval(spawnInterval);
  spawnInterval = setInterval(()=>{ if(alive) spawnEnemy(); }, spawnRate);
}

function init(){
  player = { x: world.width/2, y: world.height/2, angle:0, speed:0, drift:0 };
  bullets = []; enemies = []; missiles = []; score=0; weapon="normal"; alive=true;
  document.getElementById("gameOver").style.display="none";
  document.getElementById("weapon").innerText="Weapon: Normal";
  updateCoins();

  if(difficulty==="hard"){
    for(let i=0;i<3;i++) spawnEnemy(true);
  }
}

function updateCoins(){ document.getElementById("coins").innerText = coins; }
function buyRocket(){ if(coins>=100){ coins-=100; weapon="rocket"; document.getElementById("weapon").innerText="Weapon: Rocket 🚀"; updateCoins(); } }

function spawnEnemy(forceTank=false){
  let type = forceTank ? "tank" : (score>=15 ? "tank" : "cop");
  enemies.push({
    x: Math.random()*world.width,
    y: Math.random()*world.height,
    size: type==="tank"?28:18,
    angle:0,
    speed: (type==="tank"?0.8:1.5+Math.random())*enemySpeedMult,
    type:type,
    hp: type==="tank"?3:1,
    shootTimer: Math.random()*200 + 100
  });
}

function shoot(){ 
  if(!alive) return; 
  bullets.push({ x:player.x, y:player.y, dx:Math.cos(player.angle)*10, dy:Math.sin(player.angle)*10, type:weapon }); 
}

function explode(x,y){
  for(let i=enemies.length-1;i>=0;i--){
    let e=enemies[i];
    if(Math.hypot(e.x-x,e.y-y)<60){ enemies.splice(i,1); score++; coins++; }
  }
  updateCoins();
}

function update(){
  if(!alive) return;

  // Player movement
  if(keys["a"]) player.angle-=0.06;
  if(keys["d"]) player.angle+=0.06;
  if(keys["w"]) player.speed+=0.25;
  player.speed*=0.97;
  player.drift += (player.angle - player.drift)*0.12;
  player.x += Math.cos(player.drift)*player.speed;
  player.y += Math.sin(player.drift)*player.speed;

  // Bullets
  bullets.forEach((b,bi)=>{
    b.x+=b.dx; b.y+=b.dy;
    for(let ei=enemies.length-1;ei>=0;ei--){
      let e=enemies[ei];
      if(Math.hypot(e.x-b.x,e.y-b.y)<e.size){
        e.hp--;
        if(e.hp<=0){ if(b.type==="rocket") explode(b.x,b.y); else { enemies.splice(ei,1); score++; coins++; updateCoins(); } }
        bullets.splice(bi,1); break;
      }
    }
  });

  // Enemies
  enemies.forEach(e=>{
    let dx = player.x - e.x, dy = player.y - e.y;
    let dist = Math.hypot(dx,dy);
    e.angle = Math.atan2(dy, dx);
    e.x += Math.cos(e.angle)*e.speed;
    e.y += Math.sin(e.angle)*e.speed;

    if(e.type === "tank"){
      e.shootTimer--;
      if(e.shootTimer <= 0){
        missiles.push({
          x: e.x,
          y: e.y,
          dx: Math.cos(e.angle)*4,
          dy: Math.sin(e.angle)*4,
          size: 10
        });
        e.shootTimer = 200 + Math.random()*100;
      }
    }

    if(dist<25){ alive=false; document.getElementById("gameOver").style.display="flex"; }
  });

  // Missiles
  for(let i=missiles.length-1;i>=0;i--){
    let m = missiles[i];
    m.x += m.dx; m.y += m.dy;

    // hit player
    if(Math.hypot(player.x - m.x, player.y - m.y) < 20){
      alive=false;
      document.getElementById("gameOver").style.display="flex";
    }

    // hit bullets
    for(let bi=bullets.length-1; bi>=0; bi--){
      let b = bullets[bi];
      if(Math.hypot(b.x - m.x, b.y - m.y) < 12){
        bullets.splice(bi,1);
        missiles.splice(i,1);
        break;
      }
    }
  }
}

function drawBackground(camX,camY){
  let gradient = ctx.createLinearGradient(0,0,canvas.width,canvas.height);
  gradient.addColorStop(0,"#1e3c72"); gradient.addColorStop(1,"#2a5298");
  ctx.fillStyle=gradient; ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.strokeStyle="rgba(255,255,255,0.05)";
  for(let i=-camX%80;i<canvas.width;i+=80){ ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,canvas.height); ctx.stroke(); }
  for(let i=-camY%80;i<canvas.height;i+=80){ ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(canvas.width,i); ctx.stroke(); }
}

function drawCar(x,y,angle,color){
  ctx.save(); ctx.translate(x,y); ctx.rotate(angle); ctx.fillStyle=color; ctx.fillRect(-20,-10,40,20);
  ctx.fillStyle="#222"; ctx.fillRect(-10,-7,20,14);
  ctx.fillStyle="black"; ctx.fillRect(-18,-12,8,4); ctx.fillRect(10,-12,8,4); ctx.fillRect(-18,8,8,4); ctx.fillRect(10,8,8,4);
  ctx.restore();
}

function draw(){
  if(!player) return;
  let camX = player.x - canvas.width/2;
  let camY = player.y - canvas.height/2;
  drawBackground(camX, camY);

  drawCar(player.x - camX, player.y - camY, player.angle, "#00e5ff");

  bullets.forEach(b=>{
    ctx.fillStyle = b.type==="rocket"?"orange":"yellow";
    ctx.beginPath(); ctx.arc(b.x - camX, b.y - camY, 5,0,Math.PI*2); ctx.fill();
  });

  enemies.forEach(e=>{
    ctx.save(); ctx.translate(e.x-camX, e.y-camY); ctx.rotate(e.angle);
    if(e.type==="tank"){
      ctx.fillStyle="#3a5f3a"; ctx.fillRect(-22,-12,44,24);
      ctx.fillStyle="#2f4f2f"; ctx.fillRect(-10,-6,20,12); ctx.fillRect(10,-2,20,4);
    } else {
      ctx.fillStyle="#fff"; ctx.fillRect(-18,-10,36,20);
      ctx.fillStyle="#1a1a1a"; ctx.fillRect(-10,-6,20,12);
      ctx.fillStyle="black"; ctx.fillRect(-16,-12,7,4); ctx.fillRect(9,-12,7,4); ctx.fillRect(-16,8,7,4); ctx.fillRect(9,8,7,4);
      let t=Date.now()*0.02; ctx.fillStyle=Math.sin(t)>0?"red":"blue"; ctx.fillRect(-6,-14,12,4);
    }
    ctx.restore();
  });

  // Draw missiles
  missiles.forEach(m=>{
    ctx.fillStyle="red";
    ctx.beginPath(); ctx.arc(m.x - camX, m.y - camY, m.size/2, 0, Math.PI*2); ctx.fill();
  });

  ctx.fillStyle="white"; ctx.fillText("Score: "+score,20,30);
}

function loop(){ update(); draw(); requestAnimationFrame(loop); }
loop();

function restart(){ document.getElementById("startMenu").style.display="flex"; alive=false; if(spawnInterval) clearInterval(spawnInterval); }
</script>
</body>
</html>
